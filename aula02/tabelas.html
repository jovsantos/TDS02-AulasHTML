<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML</title>
  </head>
  <body>
    <table border="1">
      <caption>
        <strong>Informações Pessoais</strong>
      </caption>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Idade</th>
          <th>Cidade</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>João</td>
          <td>21</td>
          <td>São Paulo</td>
        </tr>

        <tr>
          <td>Juliane</td>
          <td>19</td>
          <td>São Paulo</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="3">Total de Pessoas: 2</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
