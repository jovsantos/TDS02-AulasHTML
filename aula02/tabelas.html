<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML</title>
  </head>
  <body>
    <table border="1">
      <!--Atributo border para adicionar borda à tabela -->
      <caption>
        <!--Atributo caption para adicionar legenda à tabela -->
        <strong>Informações Pessoais</strong>
      </caption>
      <thead>
        <!--A tag thead para definir o cabeçalho da tabela -->
        <tr>
          <!--A tag tr para definir uma linha da tabela -->
          <th>Nome</th>
          <!--A tag th para definir uma célula de cabeçalho, que é exibida em negrito e centralizada por padrão -->
          <th>Idade</th>
          <th>Cidade</th>
        </tr>
      </thead>
      <tbody>
        <!--A tag tbody para definir o corpo da tabela -->
        <tr>
          <td>João</td>
          <!--A tag td para definir uma célula de dados, que é exibida em texto normal e alinhada à esquerda por padrão -->
          <td>21</td>
          <td>São Paulo</td>
        </tr>

        <tr>
          <td>Juliane</td>
          <td>19</td>
          <td>São Paulo</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td colspan="3">Total de Pessoas: 2</td>
          <!--Atributo colspan para ocupar 3 colunas -->
        </tr>
      </tfoot>
    </table>
  </body>
</html>
