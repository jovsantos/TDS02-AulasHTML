<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        h1{
            background-color: brown;
            display: inline-block;
            margin-top: 20px;
            margin-left: 50px;
            border: 10px outset black;
            padding: 50px 10px 0px 60px; 
        }
        .container {
            padding: 20px 45px;
            background-color: #ddd;
            width: 100%;
            height: 50vh;
        }

    </style>
</head>
<body>
    <h1>Aula BoxModel</h1>

    <div class="container">
        <h2>Trabalhando com divs</h2>
        <p>
            Lorem ipsum dolor sit amet consectetur 
            adipisicing elit. Omnis non autem doloribus 
            illo in? Accusamus, tenetur sint laudantium provident ipsum 
            distinctio necessitatibus illo id fugiat consectetur 
            architecto exercitationem excepturi quas?
        </p>

    </div>
</body>
</html>
